<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Result — OZTOOLS</title>
<link rel="stylesheet" href="css/style.css?v=20260616121335">
</head>
<body>
<video id="bg-video" autoplay loop muted playsinline><source src="/oni%20BG.mp4" type="video/mp4"></video>
<div class="page-top">
  <div class="container">
    <div class="site-header">
      <div class="logo">OZ<span>TOOLS</span> RESULT</div>
      <div class="server-time">Server Time &nbsp;|&nbsp; <strong id="server-time">00:00:00</strong> &nbsp;|&nbsp; GMT +7</div>
    </div>

    <a href="dashboard.html" class="back-link">← Kembali</a>
    <div class="page-title">TOOLS <span>RESULT</span></div>
    <div class="page-sub">Pilih situs untuk input result keluaran</div>

    <div class="sites-grid" id="sites-grid"></div>
  </div>
  <div class="copyright">&copy; <span id="yr"></span> OZTOOLS &mdash; All Rights Reserved</div>
</div>

<style>
.sites-grid{display:grid;gap:16px;grid-template-columns:repeat(2,1fr)}
@media(min-width:500px){.sites-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:700px){.sites-grid{grid-template-columns:repeat(5,1fr)}}
.site-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border-radius:14px;padding:32px 16px;color:#fff;font-size:22px;font-weight:900;letter-spacing:2px;text-decoration:none;border:2px solid transparent;transition:all .2s;min-height:110px;text-transform:uppercase;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.site-card:hover{transform:translateY(-3px);filter:brightness(1.15)}
.site-card .lbl{font-size:10px;font-weight:600;letter-spacing:3px;opacity:.7}
</style>

<script src="config.js"></script>
<script src="js/auth.js"></script>
<script>
  checkAuth(); serverTime();
  document.getElementById('yr').textContent = new Date().getFullYear();
  const grid = document.getElementById('sites-grid');
  CONFIG.sites.forEach(site => {
    const a = document.createElement('a');
    a.href = 'tools/result-detail.html?site=' + site.id;
    a.className = 'site-card';
    a.style.background = site.gradient;
    a.style.borderColor = site.color + '44';
    a.innerHTML = '<div class="lbl">SITUS</div><div>' + site.name + '</div>';
    grid.appendChild(a);
  });
</script>
</body>
</html>
