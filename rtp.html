<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>RTP Slot — OZTOOLS</title>
<link rel="stylesheet" href="css/style.css">
<style>
.rtp-wrap { text-align: center; max-width: 420px; margin: 0 auto; }
.rtp-icon { font-size: 64px; margin-bottom: 16px; }
.rtp-desc { color: var(--text2); font-size: 14px; margin-bottom: 32px; line-height: 1.7; }
</style>
</head>
<body>
<video id="bg-video" autoplay loop muted playsinline><source src="/oni%20BG.mp4" type="video/mp4"></video>
<div class="page">
  <div class="container">
    <div class="rtp-wrap">
      <div class="rtp-icon">🎰</div>
      <div class="page-title" style="justify-content:center;display:flex;margin-bottom:8px">
        RTP <span style="color:var(--accent);margin-left:6px">SLOT</span>
      </div>
      <div class="rtp-desc">
        Halaman RTP Slot akan membuka domain yang sudah dikonfigurasi.<br>
        Pastikan domain sudah diisi di <code>config.js</code> pada field <code>rtpUrl</code>.
      </div>
      <div class="btn-group" style="justify-content:center">
        <a id="btn-rtp" href="#" target="_blank" class="btn btn-primary">🎰 Buka RTP Slot ↗</a>
        <a href="dashboard.html" class="btn btn-ghost">← Kembali</a>
      </div>
    </div>
  </div>
  <div class="copyright">&copy; <span id="yr"></span> OZTOOLS &mdash; All Rights Reserved</div>
</div>
<script src="config.js"></script>
<script src="js/auth.js"></script>
<script>
  checkAuth();
  document.getElementById('yr').textContent = new Date().getFullYear();
  document.getElementById('btn-rtp').href = CONFIG.rtpUrl;
  // Auto redirect setelah 1.5 detik
  setTimeout(() => { window.open(CONFIG.rtpUrl, '_blank'); }, 1500);
</script>
</body>
</html>
