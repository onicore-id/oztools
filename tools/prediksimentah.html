<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/webp" href="https://raw.githubusercontent.com/onicore-id/UPZONE-IMG/main/Upzone%20Logo/UPZONE-ICON-PNG.webp">
<title>Prediksi Mentah — UP ZONE</title>
<link rel="stylesheet" href="../css/style.css?v=20260616220055">
</head>
<body>
<video id="bg-video" autoplay loop muted playsinline><source src="../oni%20BG.mp4" type="video/mp4"></video>
<div class="page-top">
  <div class="container">
    <div class="site-header">
      <div class="logo"><img src="https://raw.githubusercontent.com/onicore-id/UPZONE-IMG/main/Upzone%20Logo/UPZONE-LOGO-PANJANG.webp" alt="UP ZONE" class="logo-img"> PREDIKSI</div>
      <div class="server-time">Server Time &nbsp;|&nbsp; <strong id="server-time">00:00:00</strong> &nbsp;|&nbsp; GMT +7</div>
    </div>

    <a href="#" onclick="history.back();return false" class="back-link">← Kembali</a>
    <div class="page-title" id="page-title">PREDIKSI <span>MENTAH BBFS 7</span></div>
    <div class="page-sub">Generate angka prediksi mentah secara acak</div>

    <div id="output-box" class="mentah-box" style="margin-bottom:20px"></div>

    <div class="btn-group">
      <button class="btn btn-warning" onclick="doGenerate()">Generate</button>
      <a href="#" onclick="history.back();return false" class="btn btn-ghost">← Kembali</a>
    </div>
  </div>
  <div class="copyright">&copy; <span id="yr"></span> UP ZONE &mdash; All Rights Reserved</div>
</div>

<script src="../config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/generate.js"></script>
<script>
  checkAuth(); serverTime();
  document.getElementById('yr').textContent = new Date().getFullYear();

  const p = new URLSearchParams(window.location.search);
  const type = parseInt(p.get('type')) || 7;
  document.getElementById('page-title').innerHTML = 'PREDIKSI <span>MENTAH BBFS ' + type + '</span>';

  const hari  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

  function getTodayLabel() {
    const d = new Date();
    return hari[d.getDay()] + ', ' + d.getDate() + ' ' + bulan[d.getMonth()] + ' ' + d.getFullYear();
  }

  function doGenerate() {
    const bbfs = generateBBFS(type);
    const pred = generatePrediksi(bbfs);
    const sep  = '================================================';
    const text = [
      sep,
      getTodayLabel(),
      sep,
      'AI    : ' + pred.ai,
      'BBFS  : ' + pred.bbfs,
      'CB    : ' + pred.cb,
      'CM    : ' + pred.cm,
      'Shio  : ' + pred.shio.join(' & '),
      '2D BB : ' + pred.bb2.join(' - '),
      '3D BB : ' + pred.bb3.join(' - '),
      '4D BB : ' + pred.bb4.join(' - '),
      'TWINS : ' + pred.twin.join(' & '),
      'Angka Panas : ' + pred.panas,
    ].join('\n');
    document.getElementById('output-box').textContent = text;
  }

  doGenerate();
</script>
</body>
</html>
