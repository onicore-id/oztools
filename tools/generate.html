<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Generate Prediksi — OZTOOLS</title>
<link rel="stylesheet" href="../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: flex-end;
  margin-bottom: 24px;
}
.controls .form-group { margin-bottom:0; flex:1; min-width:160px; }

/* ── CARD WRAPPER 1:1 ── */
#pred-card {
  width: 560px;
  height: 560px;
  max-width: 92vw;
  max-height: 92vw;
  margin: 0 auto 20px;
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  box-shadow: 0 0 60px rgba(0,200,80,0.25), 0 8px 40px rgba(0,0,0,0.7);
}

/* Background */
.card-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 30%, #1a4a2a 0%, #0d2a18 50%, #071510 100%);
  z-index: 0;
}
/* Corner glow */
.card-bg::before {
  content:'';
  position:absolute;
  top:-60px; left:-60px;
  width:200px; height:200px;
  background: radial-gradient(circle, rgba(0,255,100,0.12), transparent 70%);
}
.card-bg::after {
  content:'';
  position:absolute;
  bottom:-60px; right:-60px;
  width:200px; height:200px;
  background: radial-gradient(circle, rgba(0,255,100,0.12), transparent 70%);
}

/* All content above bg */
.card-inner {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 14px 16px 12px;
  box-sizing: border-box;
}

/* Top border glow line */
.card-inner::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:3px;
  background: linear-gradient(90deg, transparent, #00ff66, #ffd700, #00ff66, transparent);
}

/* ── LOGO ── */
.c-logo {
  text-align: center;
  margin-bottom: 6px;
}
.c-logo img {
  height: 42px;
  max-width: 160px;
  object-fit: contain;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
}
.c-logo-text {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  font-weight: 900;
  background: linear-gradient(180deg, #fff700, #ffaa00, #ff6600);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 2px 6px rgba(255,180,0,0.5));
  letter-spacing: 3px;
}

/* ── TITLE ── */
.c-title {
  text-align: center;
  margin-bottom: 4px;
}
.c-prediksi {
  font-family: 'Cinzel', serif;
  font-size: 26px;
  font-weight: 900;
  background: linear-gradient(180deg, #fffde0, #ffd700, #ff9500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 2px 8px rgba(255,200,0,0.6));
  letter-spacing: 1px;
  line-height: 1.1;
  text-transform: uppercase;
}
.c-date {
  font-size: 11px;
  color: rgba(255,255,255,0.6);
  font-weight: 600;
  letter-spacing: 1px;
  margin-top: 2px;
}
.c-tanggal {
  display: inline-block;
  border: 1px solid rgba(0,255,80,0.4);
  border-radius: 20px;
  padding: 3px 14px;
  font-size: 11px;
  color: #00ff80;
  font-weight: 700;
  letter-spacing: 1px;
  margin-top: 4px;
  background: rgba(0,255,80,0.07);
  box-shadow: 0 0 8px rgba(0,255,80,0.2);
}

/* ── MAIN GRID ── */
.c-main {
  display: grid;
  grid-template-columns: 1fr 160px 1fr;
  gap: 8px;
  flex: 1;
  margin: 8px 0 6px;
}

/* Left column */
.c-left {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Right column */
.c-right {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Stat box */
.s-box {
  background: rgba(0,0,0,0.45);
  border: 1.5px solid rgba(0,200,60,0.45);
  border-radius: 10px;
  padding: 8px 10px;
  text-align: center;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  box-shadow: 0 0 10px rgba(0,200,60,0.15), inset 0 0 12px rgba(0,0,0,0.3);
}
.s-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  color: #ffd700;
  text-transform: uppercase;
  margin-bottom: 4px;
  text-shadow: 0 0 6px rgba(255,215,0,0.5);
}
.s-value {
  font-family: 'Cinzel', serif;
  font-size: 28px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 2px;
  text-shadow: 0 0 12px rgba(255,255,255,0.3);
  line-height: 1;
}
.s-value.big { font-size: 22px; letter-spacing: 4px; }
.s-value.medium { font-size: 18px; letter-spacing: 1px; }

/* Center - Shio */
.c-shio {
  background: rgba(0,0,0,0.5);
  border: 1.5px solid rgba(255,215,0,0.4);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px;
  box-shadow: 0 0 16px rgba(255,215,0,0.15), inset 0 0 20px rgba(0,0,0,0.4);
  text-align: center;
  gap: 4px;
}
.shio-lbl {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 3px;
  color: #ffd700;
  text-transform: uppercase;
}
.shio-img {
  width: 88px;
  height: 88px;
  object-fit: contain;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
}
.shio-nm {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 700;
  color: #ffd700;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 0 0 8px rgba(255,215,0,0.6);
}

/* ── BOTTOM STATS ── */
.c-bottom {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 6px;
}
.b-box {
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(0,200,60,0.35);
  border-radius: 8px;
  padding: 6px 4px;
  text-align: center;
  box-shadow: 0 0 8px rgba(0,200,60,0.1);
}
.b-lbl {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 1px;
  color: #ffd700;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.b-val {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.5px;
}

/* ── FOOTER BANNER ── */
.c-footer {
  border: 1px solid rgba(0,200,60,0.4);
  border-radius: 8px;
  padding: 6px 10px;
  text-align: center;
  background: rgba(0,0,0,0.4);
  box-shadow: 0 0 10px rgba(0,200,60,0.1);
}
.c-footer-text {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1px;
  color: #fff;
  text-transform: uppercase;
}
.c-footer-text span {
  color: #ffd700;
  text-shadow: 0 0 6px rgba(255,215,0,0.5);
}

/* Corner decorations */
.corner {
  position: absolute;
  width: 40px;
  height: 40px;
  z-index: 2;
}
.corner-tl { top:8px; left:8px; border-top:2px solid #ffd700; border-left:2px solid #ffd700; border-radius:4px 0 0 0; }
.corner-tr { top:8px; right:8px; border-top:2px solid #ffd700; border-right:2px solid #ffd700; border-radius:0 4px 0 0; }
.corner-bl { bottom:8px; left:8px; border-bottom:2px solid #ffd700; border-left:2px solid #ffd700; border-radius:0 0 0 4px; }
.corner-br { bottom:8px; right:8px; border-bottom:2px solid #ffd700; border-right:2px solid #ffd700; border-radius:0 0 4px 0; }

/* Image actions */
.img-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
</style>
</head>
<body>
<div class="page-top">
  <div class="container">
    <div class="site-header">
      <div class="logo" id="logo-title">OZ<span>TOOLS</span> PREDIKSI</div>
      <div class="server-time">Server Time &nbsp;|&nbsp; <strong id="server-time">00:00:00</strong> &nbsp;|&nbsp; GMT +7</div>
    </div>

    <a href="#" onclick="history.back();return false" class="back-link">← Kembali</a>
    <div class="page-title" id="page-title">AUTO GENERATE <span>BBFS 7</span></div>
    <div class="page-sub" id="page-sub">Generate prediksi otomatis</div>

    <!-- Controls -->
    <div class="controls">
      <div class="form-group">
        <label>Tanggal</label>
        <select id="sel-tanggal"></select>
      </div>
      <div class="form-group">
        <label>Pasaran</label>
        <select id="sel-pasaran">
          <option value="">— Pilih Pasaran —</option>
        </select>
      </div>
      <button class="btn btn-warning" onclick="doGenerate()">⚡ Generate</button>
      <button class="btn btn-ghost" onclick="resetCard()">↺ Reset</button>
    </div>

    <!-- CARD 1:1 -->
    <div id="pred-card" style="display:none">
      <div class="card-bg"></div>
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="card-inner">
        <!-- Logo -->
        <div class="c-logo" id="c-logo"></div>

        <!-- Title -->
        <div class="c-title">
          <div class="c-prediksi" id="c-pasaran">PREDIKSI PASARAN</div>
          <div class="c-date" id="c-date-sub">—</div>
          <div class="c-tanggal" id="c-tanggal">—</div>
        </div>

        <!-- Main 3-col grid -->
        <div class="c-main">
          <!-- Left -->
          <div class="c-left">
            <div class="s-box">
              <div class="s-label">KEPALA</div>
              <div class="s-value" id="out-kepala">—</div>
            </div>
            <div class="s-box">
              <div class="s-label">ANGKA MAIN</div>
              <div class="s-value big" id="out-main">—</div>
            </div>
          </div>

          <!-- Center Shio -->
          <div class="c-shio">
            <div class="shio-lbl">SHIO</div>
            <img id="shio-img" class="shio-img" src="" alt="shio" crossorigin="anonymous">
            <div class="shio-nm" id="shio-nm">—</div>
          </div>

          <!-- Right -->
          <div class="c-right">
            <div class="s-box">
              <div class="s-label">BBFS</div>
              <div class="s-value medium" id="out-bbfs">—</div>
            </div>
            <div class="s-box">
              <div class="s-label">EKOR</div>
              <div class="s-value" id="out-ekor">—</div>
            </div>
          </div>
        </div>

        <!-- Bottom stats -->
        <div class="c-bottom">
          <div class="b-box">
            <div class="b-lbl">2D BB</div>
            <div class="b-val" id="out-2d">—</div>
          </div>
          <div class="b-box">
            <div class="b-lbl">3D BB</div>
            <div class="b-val" id="out-3d">—</div>
          </div>
          <div class="b-box">
            <div class="b-lbl">CB</div>
            <div class="b-val" id="out-cb">—</div>
          </div>
          <div class="b-box">
            <div class="b-lbl">CM</div>
            <div class="b-val" id="out-cm">—</div>
          </div>
        </div>

        <!-- Footer -->
        <div class="c-footer" id="c-footer">
          <div class="c-footer-text">
            MINIMAL DEPOSIT : <span>RP. 10.000</span> &nbsp;|&nbsp; MINIMAL BETTING : <span>100 PERAK</span>
          </div>
        </div>
      </div>
    </div><!-- /pred-card -->

    <!-- Image Actions -->
    <div class="img-actions" id="img-actions" style="display:none">
      <button class="btn btn-primary" onclick="convertGambar()">📸 Convert Gambar</button>
      <button class="btn btn-success" id="btn-download" style="display:none" onclick="downloadGambar()">⬇️ Download</button>
      <button class="btn btn-ghost"   id="btn-copy"     style="display:none" onclick="copyGambar()">📋 Copy</button>
      <button class="btn btn-ghost"   id="btn-newtab"   style="display:none" onclick="openNewTab()">↗️ Tab Baru</button>
    </div>

  </div>
  <div class="copyright">&copy; <span id="yr"></span> OZTOOLS &mdash; All Rights Reserved</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="../config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/generate.js"></script>
<script>
  checkAuth();
  serverTime();
  document.getElementById('yr').textContent = new Date().getFullYear();

  const params = new URLSearchParams(window.location.search);
  const type   = parseInt(params.get('type')) || 7;
  const siteId = params.get('site') || 'oz1';
  const site   = CONFIG.sites.find(s => s.id === siteId) || CONFIG.sites[0];

  document.documentElement.style.setProperty('--accent', site.color);
  document.getElementById('page-title').innerHTML = 'AUTO PREDIKSI <span>' + site.name + ' — BBFS ' + type + '</span>';

  // Logo
  const logoEl = document.getElementById('c-logo');
  if (site.logo) {
    logoEl.innerHTML = '<img src="' + site.logo + '" crossorigin="anonymous">';
  } else {
    logoEl.innerHTML = '<div class="c-logo-text">' + site.name + '</div>';
  }

  // Date options
  const selTgl = document.getElementById('sel-tanggal');
  getDateOptions(7).forEach((opt, i) => {
    const o = document.createElement('option');
    o.value = opt.label; o.textContent = opt.label;
    if (i === 0) o.selected = true;
    selTgl.appendChild(o);
  });

  // Pasaran
  const selPas = document.getElementById('sel-pasaran');
  CONFIG.pasaran.forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    selPas.appendChild(o);
  });

  let lastDataUrl = null;

  function rndShio() {
    return CONFIG.shio[Math.floor(Math.random() * CONFIG.shio.length)];
  }

  function doGenerate() {
    const pasaran = selPas.value;
    if (!pasaran) { alert('Pilih pasaran dulu!'); return; }
    const tanggal = selTgl.value;

    const bbfs = generateBBFS(type);
    const pred = generatePrediksi(bbfs);
    const shio = rndShio();

    // Kepala = digit pertama bbfs, Ekor = digit terakhir bbfs
    const kepala = bbfs[0];
    const ekor   = bbfs[bbfs.length - 1];

    // Angka main = AI (4 digit)
    const angkaMain = pred.ai;

    document.getElementById('c-pasaran').textContent  = 'PREDIKSI ' + pasaran;
    document.getElementById('c-date-sub').textContent = 'PREDIKSI ' + pasaran + ' 4D HARI INI';
    document.getElementById('c-tanggal').textContent  = tanggal;

    document.getElementById('out-kepala').textContent = kepala;
    document.getElementById('out-main').textContent   = angkaMain;
    document.getElementById('out-bbfs').textContent   = bbfs;
    document.getElementById('out-ekor').textContent   = ekor;

    document.getElementById('out-2d').textContent = pred.bb2.slice(0,3).join(' · ');
    document.getElementById('out-3d').textContent = pred.bb3.slice(0,2).join(' · ');
    document.getElementById('out-cb').textContent = pred.cb;
    document.getElementById('out-cm').textContent = pred.cm;

    document.getElementById('shio-img').src = shio.img;
    document.getElementById('shio-nm').textContent = shio.name;

    document.getElementById('pred-card').style.display = 'block';
    document.getElementById('img-actions').style.display = 'flex';
    document.getElementById('btn-download').style.display = 'none';
    document.getElementById('btn-copy').style.display     = 'none';
    document.getElementById('btn-newtab').style.display   = 'none';
    lastDataUrl = null;

    document.getElementById('pred-card').scrollIntoView({ behavior:'smooth', block:'center' });
  }

  function resetCard() {
    document.getElementById('pred-card').style.display   = 'none';
    document.getElementById('img-actions').style.display = 'none';
    document.getElementById('sel-pasaran').value = '';
    lastDataUrl = null;
  }

  function convertGambar() {
    html2canvas(document.getElementById('pred-card'), {
      backgroundColor: '#071510',
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
      width: 560,
      height: 560
    }).then(canvas => {
      lastDataUrl = canvas.toDataURL('image/png');
      document.getElementById('btn-download').style.display = 'inline-flex';
      document.getElementById('btn-copy').style.display     = 'inline-flex';
      document.getElementById('btn-newtab').style.display   = 'inline-flex';
    });
  }

  function downloadGambar() {
    if (!lastDataUrl) return;
    const a = document.createElement('a');
    const pas = document.getElementById('sel-pasaran').value.replace(/\s+/g,'_');
    a.download = 'prediksi_' + site.id + '_' + pas + '.png';
    a.href = lastDataUrl; a.click();
  }

  function copyGambar() {
    if (!lastDataUrl) return;
    fetch(lastDataUrl).then(r=>r.blob()).then(blob=>{
      navigator.clipboard.write([new ClipboardItem({'image/png':blob})]).then(()=>alert('Gambar berhasil dicopy!'));
    });
  }

  function openNewTab() {
    if (!lastDataUrl) return;
    const w = window.open();
    w.document.write('<img src="'+lastDataUrl+'" style="max-width:100%;display:block;margin:0 auto">');
    w.document.close();
  }
</script>
</body>
</html>
