<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/webp" href="https://raw.githubusercontent.com/onicore-id/UPZONE-IMG/main/Upzone%20Logo/UPZONE-ICON-PNG.webp">
<title>Poltar — UP ZONE</title>
<link rel="stylesheet" href="../css/style.css?v=20260616220644">
<style>
.poltar-wrap { max-width: 420px; margin: 0 auto; }
.poltar-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px 24px;
  text-align: center;
  margin-bottom: 20px;
}
.poltar-date {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 20px;
  font-weight: 500;
}
.poltar-row {
  margin-bottom: 16px;
}
.poltar-lbl {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #64748b;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.poltar-val {
  font-size: 48px;
  font-weight: 900;
  letter-spacing: 8px;
  color: #facc15;
  transition: filter 0.3s, color 0.3s;
  user-select: none;
  line-height: 1;
}
.poltar-val.blurred {
  filter: blur(10px);
  color: #444;
}
.poltar-val.blocked {
  filter: none;
  color: transparent;
  background: #333;
  border-radius: 6px;
}
.poltar-sub {
  font-size: 14px;
  color: var(--text2);
  margin-top: 8px;
}
.poltar-sub span { color: #fff; font-weight: 700; }
.mask-btns {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
</style>
</head>
<body>
<video id="bg-video" autoplay loop muted playsinline><source src="../oni%20BG.mp4" type="video/mp4"></video>
<div class="page-top">
  <div class="container">
    <div class="site-header">
      <div class="logo"><img src="https://raw.githubusercontent.com/onicore-id/UPZONE-IMG/main/Upzone%20Logo/UPZONE-LOGO-PANJANG.webp" alt="UP ZONE" class="logo-img"> PREDIKSI</div>
      <div class="server-time">Server Time &nbsp;|&nbsp; <strong id="server-time">00:00:00</strong> &nbsp;|&nbsp; GMT +7</div>
    </div>

    <a href="#" onclick="history.back();return false" class="back-link">← Kembali</a>
    <div class="page-title">PREDIKSI <span>POLTAR</span></div>
    <div class="page-sub">Generate BBFS dengan mode tampilan tersembunyi</div>

    <div class="poltar-wrap">
      <div class="poltar-box">
        <div class="poltar-date" id="pol-date">—</div>
        <div class="poltar-row">
          <div class="poltar-lbl">BBFS 7</div>
          <div class="poltar-val" id="pol-bbfs">—</div>
        </div>
        <div class="poltar-row">
          <div class="poltar-lbl">4D BB</div>
          <div class="poltar-sub" id="pol-4d">—</div>
        </div>
        <div class="poltar-row">
          <div class="poltar-lbl">SHIO</div>
          <div class="poltar-sub"><span id="pol-shio">—</span></div>
        </div>
        <div class="poltar-row">
          <div class="poltar-lbl">ANGKA PANAS</div>
          <div class="poltar-sub"><span id="pol-panas">—</span></div>
        </div>
      </div>

      <div class="mask-btns">
        <button class="btn btn-ghost" id="btn-blur" onclick="toggleBlur()"> Blur</button>
        <button class="btn btn-ghost" id="btn-blok" onclick="toggleBlok()"> Blok</button>
      </div>

      <div class="btn-group">
        <button class="btn btn-warning" onclick="doGenerate()">Generate</button>
        <a href="#" onclick="history.back();return false" class="btn btn-ghost">← Kembali</a>
      </div>
    </div>
  </div>
  <div class="copyright">&copy; <span id="yr"></span> UP ZONE &mdash; All Rights Reserved</div>
</div>

<script src="../config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/generate.js"></script>
<script>
  checkAuth(); serverTime();
  document.getElementById('yr').textContent = new Date().getFullYear();

  const hari  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

  function getToday() {
    const d = new Date();
    return hari[d.getDay()] + ', ' + d.getDate() + ' ' + bulan[d.getMonth()] + ' ' + d.getFullYear();
  }

  let blurOn = false, blokOn = false;

  function doGenerate() {
    const bbfs = generateBBFS(7);
    const pred = generatePrediksi(bbfs);
    document.getElementById('pol-date').textContent  = getToday();
    document.getElementById('pol-bbfs').textContent  = pred.bbfs;
    document.getElementById('pol-4d').textContent    = pred.bb4.join(' - ');
    document.getElementById('pol-shio').textContent  = pred.shio.join(' & ');
    document.getElementById('pol-panas').textContent = pred.panas;
    // reset mask
    blurOn = false; blokOn = false;
    document.getElementById('pol-bbfs').className = 'poltar-val';
  }

  function toggleBlur() {
    blokOn = false;
    blurOn = !blurOn;
    const el = document.getElementById('pol-bbfs');
    el.className = 'poltar-val' + (blurOn ? ' blurred' : '');
    document.getElementById('btn-blur').textContent = blurOn ? ' Tampilkan' : ' Blur';
  }

  function toggleBlok() {
    blurOn = false;
    blokOn = !blokOn;
    const el = document.getElementById('pol-bbfs');
    el.className = 'poltar-val' + (blokOn ? ' blocked' : '');
    document.getElementById('btn-blok').textContent = blokOn ? ' Tampilkan' : ' Blok';
  }

  doGenerate();
</script>
</body>
</html>
