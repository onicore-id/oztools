<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/webp" href="https://raw.githubusercontent.com/onicore-id/UPZONE-IMG/main/Upzone%20Logo/UPZONE-ICON-PNG.webp">
<title>Login — UP ZONE</title>
<link rel="stylesheet" href="css/style.css?v=20260616220644">
<style>
.page { justify-content: center; min-height: 100vh; }
.login-wrap { width: 100%; max-width: 400px; }
.login-logo { text-align: center; margin-bottom: 36px; }
.login-logo-img {
  display: block;
  margin: 0 auto;
  width: 100%;
  max-width: 280px;
  height: auto;
  object-fit: contain;
}
.login-logo .sub {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 6px;
}
</style>
</head>
<body>
<video id="bg-video" autoplay loop muted playsinline><source src="/oni%20BG.mp4" type="video/mp4"></video>
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1">
  <div class="login-wrap">
    <div class="login-logo">
      <img src="https://raw.githubusercontent.com/onicore-id/UPZONE-IMG/main/Upzone%20Logo/UPZONE-LOGO-PANJANG.webp" alt="UP ZONE" class="login-logo-img">
      <div class="sub">Management System</div>
    </div>

    <div class="card">
      <div id="err-msg" class="alert alert-error" style="display:none"></div>
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="uname" placeholder="Masukkan username" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="upass" placeholder="Masukkan password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">
          Login &rarr;
        </button>
      </form>
    </div>
  </div>

  <div class="copyright">
    &copy; <span id="yr"></span> UP ZONE &mdash; All Rights Reserved
  </div>
</div>

<script src="config.js"></script>
<script>
  document.getElementById('yr').textContent = new Date().getFullYear();

  if (sessionStorage.getItem('oz_auth')) {
    window.location.href = 'dashboard.html';
  }

  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const u = document.getElementById('uname').value.trim();
    const p = document.getElementById('upass').value;
    const match = CONFIG.credentials.find(c => c.username === u && c.password === p);
    if (match) {
      sessionStorage.setItem('oz_auth', u);
      window.location.href = 'dashboard.html';
    } else {
      const err = document.getElementById('err-msg');
      err.textContent = 'Username atau password salah.';
      err.style.display = 'block';
    }
  });
</script>
</body>
</html>
